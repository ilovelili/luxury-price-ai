services:
  - type: web
    name: auction-price-checker-ai
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn luxury_price_ai.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_API_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VISION_MODEL
        value: "gpt-5.5"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_VISION_MODEL
        value: "gemini-3.5-flash"
      - key: PRICE_MARGIN_RATE
        value: "0.25"
      - key: PRICE_RISK_DISCOUNT_RATE
        value: "0.05"
      - key: DIFY_API_KEY
        sync: false
      - key: DIFY_BASE_URL
        value: "https://api.dify.ai/v1"
      - key: DIFY_USER
        value: "luxury-price-appraisal-web"
