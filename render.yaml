services:
  - type: web
    name: auction-price-checker-ai
    runtime: python
    plan: starter
    buildCommand: pip install -e .
    startCommand: uvicorn luxury_price_ai.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_API_KEY
        generateValue: true
      - key: PRICE_MARGIN_RATE
        value: "0.25"
      - key: PRICE_RISK_DISCOUNT_RATE
        value: "0.05"
